<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lux Satelital - Sistema Administrativo</title>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    /* ──────────────────────────────────────── */
    /* ESTILOS GENERALES Y UI                   */
    /* ──────────────────────────────────────── */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Montserrat', sans-serif; background: #f5f5f5; padding-bottom: 40px; }
    
    /* Menú de Navegación */
    .navbar { background: #111; padding: 0 20px; display: flex; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 100;}
    .nav-btn { background: transparent; color: #888; border: none; padding: 20px; font-size: 15px; font-weight: 700; cursor: pointer; transition: 0.3s; font-family: inherit; }
    .nav-btn:hover { color: #ddd; }
    .nav-btn.active { color: #fff; border-bottom: 3px solid #fff; }
    
    /* Contenedor Principal */
    .content { max-width: 680px; margin: 20px auto; padding: 0 20px; }
    
    /* Tarjetas del Dashboard */
    .dashboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
    .card { background: #fff; border-radius: 12px; padding: 20px; border: 1px solid #e8e8e8; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
    .card h3 { font-size: 13px; color: #666; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
    .kpi { font-size: 28px; font-weight: 900; color: #111; }
    .kpi-red { color: #c00; }
    .kpi-green { color: #090; }
    
    /* Lista de Clientes (Recibos y Morosos) */
    .cliente-item { background: #fff; padding: 16px 20px; margin-bottom: 12px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #e8e8e8; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
    .cliente-info strong { font-size: 15px; color: #111; }
    .cliente-info p { font-size: 13px; color: #666; margin-top: 4px; font-weight: 500; }
    
    /* Etiquetas de Estado */
    .badge { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; margin-left: 8px; vertical-align: middle;}
    .badge-pagado { background: #d4edda; color: #155724; }
    .badge-pendiente { background: #f8d7da; color: #721c24; }
    
    /* Botones y Formularios */
    .btn { padding: 10px 16px; border-radius: 6px; border: none; cursor: pointer; font-weight: 700; font-family: inherit; font-size: 13px; transition: 0.2s;}
    .btn-action { background: #111; color: #fff; }
    .btn-action:hover { background: #333; }
    .btn-print { background: #090; color: #fff; padding: 10px 14px; }
    .btn-edit { background: #e0e0e0; color: #333; padding: 10px 14px; margin-right: 5px; }
    
    .form-group { margin-bottom: 15px; }
    .form-label { display: block; font-size: 12px; color: #555; margin-bottom: 5px; font-weight: 600; }
    .form-input { width: 100%; padding: 12px; border: 1.5px solid #ddd; border-radius: 8px; font-size: 14px; font-family: inherit; }
    
    /* Ocultar canvas temporalmente en pantalla */
    #hiddenCanvas { display: none; }
  </style>
</head>
<body>

<div class="navbar">
  <button class="nav-btn active" id="tab-dashboard" onclick="cambiarVista('dashboard')">📊 DASHBOARD</button>
  <button class="nav-btn" id="tab-recibos" onclick="cambiarVista('recibos')">🖨️ RECIBOS</button>
</div>

<div id="app" class="content"></div>

<canvas id="hiddenCanvas"></canvas>

<script>
// ────────────────────────────────────────
// 1. BASE DE DATOS Y CONFIGURACIÓN
// ────────────────────────────────────────
const MESES = ["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];
let fechaGlobal = new Date().toISOString().split('T')[0];

// Tus 32 clientes. Por defecto los puse en "Pendiente". 
// Cámbialos a "Pagado" desde la app para ver cómo funciona el Dashboard.
let clientes = [
  { id: 1, nombre: "Karen Autre", monto: 400, formaPago: "Efectivo", estado: "Pendiente" },
  { id: 2, nombre: "Ana Melchor", monto: 400, formaPago: "Efectivo", estado: "Pendiente" },
  { id: 3, nombre: "Suegros", monto: 400, formaPago: "Efectivo", estado: "Pendiente" },
  { id: 4, nombre: "Oliver Rancho", monto: 400, formaPago: "Efectivo", estado: "Pendiente" },
  { id: 5, nombre: "Adorit Ramos", monto: 400, formaPago: "Efectivo", estado: "Pendiente" },
  { id: 6, nombre: "Melissa", monto: 350, formaPago: "Efectivo", estado: "Pendiente" },
  { id: 7, nombre: "Lili Rivera", monto: 300, formaPago: "Efectivo", estado: "Pendiente" },
  { id: 8, nombre: "Dany Janey", monto: 300, formaPago: "Efectivo", estado: "Pendiente" },
  { id: 9, nombre: "Diana Aguilar", monto: 300, formaPago: "Efectivo", estado: "Pendiente" },
  { id: 10, nombre: "Orquídea", monto: 300, formaPago: "Efectivo", estado: "Pendiente" },
  { id: 11, nombre: "Isaac Grajales", monto: 300, formaPago: "Efectivo", estado: "Pendiente" },
  { id: 12, nombre: "Seres Simuta", monto: 300, formaPago: "Efectivo", estado: "Pendiente" },
  { id: 13, nombre: "Eréndira", monto: 300, formaPago: "Efectivo", estado: "Pendiente" },
  { id: 14, nombre: "Enelva Macal", monto: 300, formaPago: "Efectivo", estado: "Pendiente" },
  { id: 15, nombre: "Yesenia", monto: 300, formaPago: "Efectivo", estado: "Pendiente" },
  { id: 16, nombre: "Martín Antonio", monto: 250, formaPago: "Efectivo", estado: "Pendiente" },
  { id: 17, nombre: "Olga Martínez", monto: 400, formaPago: "Efectivo", estado: "Pendiente" },
  { id: 18, nombre: "Lilia García Velazco", monto: 480, formaPago: "Efectivo", estado: "Pendiente" },
  { id: 19, nombre: "Ciro", monto: 400, formaPago: "Efectivo", estado: "Pendiente" },
  { id: 20, nombre: "Carmen", monto: 480, formaPago: "Efectivo", estado: "Pendiente" },
  { id: 21, nombre: "Itzel", monto: 480, formaPago: "Efectivo", estado: "Pendiente" },
  { id: 22, nombre: "Jose Alberto Reyes Ramírez", monto: 400, formaPago: "Efectivo", estado: "Pendiente" },
  { id: 23, nombre: "Aravela Ruiz", monto: 480, formaPago: "Efectivo", estado: "Pendiente" },
  { id: 24, nombre: "Oscar Andrés Torres Guillén", monto: 480, formaPago: "Efectivo", estado: "Pendiente" },
  { id: 25, nombre: "Álvaro Álvarez Hernández", monto: 400, formaPago: "Efectivo", estado: "Pendiente" },
  { id: 26, nombre: "Marlene Hernández Díaz", monto: 400, formaPago: "Efectivo", estado: "Pendiente" },
  { id: 27, nombre: "Cinthia Lisset Lara Moreno", monto: 480, formaPago: "Efectivo", estado: "Pendiente" },
  { id: 28, nombre: "Maria Guadalupe Hernández Cruz", monto: 480, formaPago: "Efectivo", estado: "Pendiente" },
  { id: 29, nombre: "Cinthia Elizabeth Gómez Hernández", monto: 480, formaPago: "Efectivo", estado: "Pendiente" },
  { id: 30, nombre: "José Eduardo Sánchez Gordillo", monto: 480, formaPago: "Efectivo", estado: "Pendiente" },
  { id: 31, nombre: "Fredy Ventura Méndez", monto: 400, formaPago: "Efectivo", estado: "Pendiente" },
  { id: 32, nombre: "Alejandro Hernández Hernández", monto: 300, formaPago: "Efectivo", estado: "Pendiente" }
];

let vistaActual = 'dashboard';
let clienteSeleccionado = null;

// Funciones Auxiliares
function obtenerMegas(monto) {
  const m = Number(monto);
  if (m === 250) return "8 megas";
  if (m === 300 || m === 350) return "10 megas";
  if (m === 400) return "15 megas";
  if (m === 480) return "20 megas";
  return "Plan personalizado";
}

function formatearFecha(isoStr) {
  const [y, m, d] = isoStr.split('-');
  return `${d} de ${MESES[parseInt(m)-1]} de ${y}`;
}

function periodoServicio(isoStr) {
  const date = new Date(isoStr + 'T12:00:00');
  const inicio = new Date(date);
  const fin = new Date(date);
  fin.setMonth(fin.getMonth() + 1);
  fin.setDate(fin.getDate() - 1);
  return `${inicio.getDate()} de ${MESES[inicio.getMonth()]} al ${fin.getDate()} de ${MESES[fin.getMonth()]}`;
}

// ────────────────────────────────────────
// 2. LÓGICA DE INTERFAZ (VISTAS)
// ────────────────────────────────────────
function cambiarVista(vista) {
  vistaActual = vista;
  // Actualizar menú
  document.getElementById('tab-dashboard').className = (vista === 'dashboard') ? 'nav-btn active' : 'nav-btn';
  document.getElementById('tab-recibos').className = (vista === 'recibos') ? 'nav-btn active' : 'nav-btn';
  render();
}

function render() {
  const app = document.getElementById('app');
  
  if (vistaActual === 'dashboard') {
    // Calcular KPIs
    const pendientes = clientes.filter(c => c.estado === 'Pendiente');
    const pagados = clientes.filter(c => c.estado === 'Pagado');
    const totalPendiente = pendientes.reduce((sum, c) => sum + Number(c.monto), 0);
    const totalPagado = pagados.reduce((sum, c) => sum + Number(c.monto), 0);

    let html = `
      <div style="margin-bottom: 20px;">
        <h2 style="color:#111;">Resumen de Operación</h2>
      </div>
      
      <div class="dashboard-grid">
        <div class="card">
          <h3>Ingreso Recaudado</h3>
          <div class="kpi kpi-green">$${totalPagado}</div>
          <p style="font-size:12px; color:#666; margin-top:5px;">${pagados.length} clientes pagaron</p>
        </div>
        <div class="card">
          <h3>Por Cobrar</h3>
          <div class="kpi kpi-red">$${totalPendiente}</div>
          <p style="font-size:12px; color:#666; margin-top:5px;">${pendientes.length} clientes pendientes</p>
        </div>
      </div>

      <h3 style="margin-bottom: 10px; color:#111; font-size:16px;">Atención Requerida (Morosos)</h3>
    `;
    
    if (pendientes.length === 0) {
      html += `<div class="card" style="text-align:center; color:#090;">¡Excelente! Todos los clientes han pagado.</div>`;
    } else {
      pendientes.forEach(c => {
        html += `
          <div class="cliente-item" style="border-left: 4px solid #c00;">
            <div class="cliente-info">
              <strong>${c.nombre}</strong>
              <p>Monto: $${c.monto} - ${c.formaPago}</p>
            </div>
            <button class="btn btn-action" onclick="clienteSeleccionado=clientes.find(x=>x.id===${c.id}); cambiarVista('formulario')">Gestionar</button>
          </div>
        `;
      });
    }
    app.innerHTML = html;

  } else if (vistaActual === 'recibos') {
    app.innerHTML = `
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 20px;">
        <h2 style="color:#111;">Gestión de Recibos</h2>
        <button class="btn btn-action" onclick="clienteSeleccionado=null; cambiarVista('formulario')">➕ Nuevo</button>
      </div>
      
      <div class="form-group">
        <label class="form-label">Fecha de emisión para recibos:</label>
        <input type="date" class="form-input" id="fechaEmision" value="${fechaGlobal}" onchange="fechaGlobal=this.value">
      </div>

      <div id="lista-completa">
        ${clientes.map(c => `
          <div class="cliente-item">
            <div class="cliente-info">
              <strong>${c.nombre}</strong> 
              <span class="badge ${c.estado === 'Pagado' ? 'badge-pagado' : 'badge-pendiente'}">${c.estado}</span>
              <p>$${c.monto} | ${obtenerMegas(c.monto)} | ${c.formaPago}</p>
            </div>
            <div>
              <button class="btn btn-edit" onclick="clienteSeleccionado=clientes.find(x=>x.id===${c.id}); cambiarVista('formulario')">✎</button>
              <button class="btn btn-print" onclick="generarYDescargarRecibo(${c.id})">🖨️</button>
            </div>
          </div>
        `).join('')}
      </div>
    `;

  } else if (vistaActual === 'formulario') {
    const isEdit = !!clienteSeleccionado;
    const c = clienteSeleccionado || { nombre: '', monto: '', formaPago: 'Efectivo', estado: 'Pendiente' };
    
    app.innerHTML = `
      <div class="card">
        <h2 style="margin-bottom: 20px;">${isEdit ? 'Editar Cliente' : 'Registrar Nuevo Cliente'}</h2>
        
        <div class="form-group">
          <label class="form-label">Nombre del Cliente</label>
          <input type="text" id="form-nombre" class="form-input" value="${c.nombre}">
        </div>
        
        <div class="form-group">
          <label class="form-label">Monto Mensual ($)</label>
          <input type="number" id="form-monto" class="form-input" value="${c.monto}">
        </div>
        
        <div class="form-group">
          <label class="form-label">Forma de Pago Habitual</label>
          <select id="form-formaPago" class="form-input">
            <option ${c.formaPago==='Efectivo'?'selected':''}>Efectivo</option>
            <option ${c.formaPago==='Transferencia'?'selected':''}>Transferencia</option>
            <option ${c.formaPago==='Depósito'?'selected':''}>Depósito</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label">Estado de Mensualidad</label>
          <select id="form-estado" class="form-input" style="background: ${c.estado==='Pagado'?'#d4edda':'#f8d7da'}; font-weight:bold;">
            <option value="Pendiente" ${c.estado==='Pendiente'?'selected':''}>Pendiente por cobrar</option>
            <option value="Pagado" ${c.estado==='Pagado'?'selected':''}>Ya Pagó</option>
          </select>
        </div>
        
        <div style="display:flex; gap:10px; margin-top:25px;">
          <button class="btn btn-action" style="flex:1" onclick="guardarCliente()">💾 Guardar</button>
          <button class="btn btn-edit" style="flex:1" onclick="cambiarVista('recibos')">Cancelar</button>
        </div>
      </div>
    `;
    
    // Cambiar color del select dinámicamente
    document.getElementById('form-estado').addEventListener('change', function() {
      this.style.background = this.value === 'Pagado' ? '#d4edda' : '#f8d7da';
    });
  }
}

function guardarCliente() {
  const nombre = document.getElementById('form-nombre').value;
  const monto = document.getElementById('form-monto').value;
  const formaPago = document.getElementById('form-formaPago').value;
  const estado = document.getElementById('form-estado').value;

  if (!nombre || !monto) return alert('Completa nombre y monto');

  if (clienteSeleccionado) {
    clienteSeleccionado.nombre = nombre;
    clienteSeleccionado.monto = monto;
    clienteSeleccionado.formaPago = formaPago;
    clienteSeleccionado.estado = estado;
  } else {
    clientes.unshift({ id: Date.now(), nombre, monto, formaPago, estado });
  }
  cambiarVista('recibos');
}

// ────────────────────────────────────────
// 3. MOTOR DE RENDERIZADO DEL RECIBO (CANVAS EXACTO)
// ────────────────────────────────────────
function generarYDescargarRecibo(id) {
  const c = clientes.find(x => x.id === id);
  const canvas = document.getElementById("hiddenCanvas");
  const W = 794, H = 1123; 
  canvas.width = W * 2; 
  canvas.height = H * 2;
  const ctx = canvas.getContext("2d");
  
  // Limpiar y escalar
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.scale(2, 2); 

  // Fondo Blanco Base
  ctx.fillStyle = "#ffffff";
  ctx.fillRect(0, 0, W, H);

  // 1. BARRA GRIS SUPERIOR
  ctx.fillStyle = "#737170"; 
  ctx.fillRect(0, 105, W, 76);

  // 2. TÍTULO "RECIBO DE PAGO"
  ctx.fillStyle = "#ffffff";
  ctx.font = "600 32px 'Montserrat', sans-serif";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.letterSpacing = "2px";
  ctx.fillText("RECIBO DE PAGO", 280 + (W - 280) / 2, 105 + 76 / 2);
  ctx.letterSpacing = "0px";

  // 3. CAJA NEGRA DEL LOGO
  ctx.fillStyle = "#000000";
  ctx.fillRect(88, 55, 190, 190);

  ctx.fillStyle = "#ffffff";
  ctx.textAlign = "center";
  ctx.textBaseline = "alphabetic";
  ctx.font = "900 56px 'Montserrat', sans-serif";
  ctx.letterSpacing = "5px";
  ctx.fillText("LUX", 185, 155);
  
  ctx.font = "600 13px 'Montserrat', sans-serif";
  ctx.fillStyle = "#c0c0c0";
  ctx.letterSpacing = "6px";
  ctx.fillText("SATELITAL", 188, 188);
  ctx.letterSpacing = "0px";

  // 4. DATOS LATERALES DERECHOS
  const labelX = 600, valorX = 620, maxRight = W - 88;

  function campoLinea(label, valor, y) {
    ctx.font = "600 16px 'Montserrat', sans-serif";
    ctx.fillStyle = "#333333";
    ctx.textAlign = "right";
    ctx.fillText(label, labelX, y);
    
    ctx.strokeStyle = "#cccccc";
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(valorX, y + 4);
    ctx.lineTo(maxRight, y + 4);
    ctx.stroke();
    
    ctx.font = "500 16px 'Montserrat', sans-serif";
    ctx.fillStyle = "#000000";
    ctx.textAlign = "left";
    ctx.fillText(valor, valorX + 6, y);
  }

  campoLinea("Fecha", formatearFecha(fechaGlobal), 285);
  campoLinea("Recibo a", c.nombre, 330);
  campoLinea("Plan Adquirido", obtenerMegas(c.monto), 375);

  // 5. ESTRUCTURA CENTRAL
  const lx = 88; 

  function lineaTexto(label, valor, y, customWidth) {
    ctx.font = "600 16px 'Montserrat', sans-serif";
    ctx.fillStyle = "#333333";
    ctx.textAlign = "left";
    ctx.fillText(label, lx, y);
    
    const textW = ctx.measureText(label).width;
    const startLine = lx + textW + 14;
    const endLine = customWidth ? (startLine + customWidth) : maxRight;

    ctx.strokeStyle = "#cccccc";
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(startLine, y + 4);
    ctx.lineTo(endLine, y + 4);
    ctx.stroke();

    ctx.font = "500 16px 'Montserrat', sans-serif";
    ctx.fillStyle = "#000000";
    ctx.fillText(valor, startLine + 10, y);
    return endLine;
  }

  lineaTexto("Recibí de", "Servicio de Internet Satelital", 465);

  const endSumaX = lineaTexto("La suma de", `$${c.monto}`, 535, 200);
  
  const fpLabelX = endSumaX + 28;
  ctx.font = "600 16px 'Montserrat', sans-serif";
  ctx.fillStyle = "#333333";
  ctx.fillText("Forma de pago", fpLabelX, 535);
  
  const fpLabelW = ctx.measureText("Forma de pago").width;
  const fpLineStart = fpLabelX + fpLabelW + 14;
  
  ctx.strokeStyle = "#cccccc";
  ctx.beginPath();
  ctx.moveTo(fpLineStart, 539);
  ctx.lineTo(maxRight, 539);
  ctx.stroke();
  
  ctx.fillStyle = "#000000";
  ctx.font = "500 16px 'Montserrat', sans-serif";
  ctx.fillText(c.formaPago, fpLineStart + 10, 535);

  lineaTexto("Por el trabajo realizado:", "servicio de internet", 605);

  // 6. LÍNEAS SEPARADORAS DECORATIVAS
  ctx.setLineDash([4, 5]);
  ctx.strokeStyle = "#aaaaaa";
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(lx, 655);
  ctx.lineTo(maxRight, 655);
  ctx.stroke();
  ctx.setLineDash([]); 

  ctx.strokeStyle = "#737170";
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(lx, 672);
  ctx.lineTo(maxRight, 672);
  ctx.stroke();

  lineaTexto("Correspondiente al periodo de", periodoServicio(fechaGlobal), 735);

  // 7. ÁREA DE FIRMA
  ctx.font = "normal 58px 'Great Vibes', cursive";
  ctx.fillStyle = "#000000";
  ctx.textAlign = "center";
  ctx.fillText("Lux Satelital", W / 2, 875);

  ctx.strokeStyle = "#cccccc";
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(W / 2 - 140, 895);
  ctx.lineTo(W / 2 + 140, 895);
  ctx.stroke();

  ctx.font = "500 13px 'Montserrat', sans-serif";
  ctx.fillStyle = "#777777";
  ctx.fillText("Firma y aclaración", W / 2, 920);
  ctx.fillText("receptor", W / 2, 940);

  // 8. PIE DE PÁGINA CORPORATIVO
  ctx.fillStyle = "#737170";
  ctx.fillRect(0, H - 175, W, 36);

  ctx.font = "800 18px 'Montserrat', sans-serif";
  ctx.fillStyle = "#000000";
  ctx.letterSpacing = "2px";
  ctx.fillText("CONTACTO", W / 2, H - 100);
  ctx.letterSpacing = "0px";

  const telefono = "961 269 75 67";
  ctx.font = "700 22px 'Montserrat', sans-serif";
  const telW = ctx.measureText(telefono).width;
  const startXImg = (W / 2) - (telW / 2) - 18; 
  
  ctx.textAlign = "left";
  ctx.fillStyle = "#111111";
  ctx.fillText(telefono, startXImg + 36, H - 52);

  const imgWA = new Image();
  imgWA.crossOrigin = "anonymous";
  imgWA.src = "https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg";
  
  if (imgWA.complete) {
    ctx.drawImage(imgWA, startXImg, H - 74, 26, 26);
    ejecutarDescarga(canvas, c.nombre, fechaGlobal);
  } else {
    imgWA.onload = function() {
      ctx.drawImage(imgWA, startXImg, H - 74, 26, 26);
      ejecutarDescarga(canvas, c.nombre, fechaGlobal);
    };
  }
}

function ejecutarDescarga(canvas, nombre, fecha) {
  const link = document.createElement('a');
  link.download = `Recibo_${nombre.replace(/ /g,'_')}_${fecha}.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
}

// Iniciar aplicación asegurando carga de fuentes
document.fonts.ready.then(() => {
  render();
});
</script>

</body>
</html>
