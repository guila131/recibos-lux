<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generador de Recibos - Lux Satelital</title>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Montserrat', 'Helvetica Neue', Arial, sans-serif; background: #f5f5f5; }
    
    .container { width: 100%; }
    .header { 
      background: #111; padding: 16px 28px; display: flex; align-items: center; gap: 14px; 
      color: #fff;
    }
    .header-logo { display: flex; flex-direction: column; }
    .header-logo .name { font-size: 22px; font-weight: 900; letter-spacing: 3px; font-family: 'Montserrat', sans-serif; }
    .header-logo .sub { font-size: 9px; letter-spacing: 4px; color: #aaa; font-family: 'Montserrat', sans-serif; }
    .header-divider { width: 1px; height: 40px; background: #444; }
    .header-title { color: #ddd; font-size: 13px; font-weight: 500; letter-spacing: 1px; }
    
    .content { max-width: 680px; margin: 0 auto; padding: 32px 20px; }
    .main { background: #f5f5f5; min-height: 100vh; }
    
    .form-group { margin-bottom: 12px; display: flex; gap: 10px; flex-wrap: wrap; }
    .search-input { flex: 1; min-width: 200px; padding: 12px 16px; border-radius: 8px; border: 1.5px solid #ddd; font-size: 14px; font-family: inherit; }
    .btn-primary { background: #111; color: #fff; padding: 12px 20px; border-radius: 8px; border: none; cursor: pointer; font-size: 14px; font-weight: 600; white-space: nowrap; font-family: inherit; }
    .btn-primary:hover { background: #333; }
    .btn-secondary { background: #fff; color: #111; padding: 10px 22px; border-radius: 7px; border: none; cursor: pointer; font-size: 14px; font-weight: 700; font-family: inherit; }
    .btn-secondary:hover { background: #eee; }
    .btn-danger { background: #fff; color: #c00; padding: 9px 14px; border-radius: 7px; border: 1.5px solid #eee; cursor: pointer; font-size: 13px; font-family: inherit; }
    .btn-danger:hover { background: #ffe0e0; }
    .btn-small { background: #111; color: #fff; padding: 9px 18px; border-radius: 7px; border: none; cursor: pointer; font-size: 13px; font-weight: 600; font-family: inherit; }
    .btn-small:hover { background: #333; }
    
    .date-section { display: flex; align-items: center; gap: 10px; }
    .date-label { font-size: 13px; color: #555; white-space: nowrap; }
    .date-input { padding: 8px 12px; border-radius: 8px; border: 1.5px solid #ddd; font-size: 13px; font-family: inherit; }
    
    .clientes-list { display: flex; flex-direction: column; gap: 10px; }
    .cliente-item { 
      background: #fff; border-radius: 10px; border: 1.5px solid #e8e8e8; padding: 16px 20px;
      display: flex; justify-content: space-between; align-items: center; box-shadow: 0 1px 4px rgba(0,0,0,.04);
    }
    .cliente-info h3 { font-weight: 700; font-size: 15px; }
    .cliente-info p { color: #888; font-size: 12px; margin-top: 3px; }
    .cliente-actions { display: flex; gap: 8px; }
    
    .empty-state { text-align: center; color: #aaa; padding: 40px 0; font-size: 14px; }
    
    .recibo-view { background: #e8e8e8; min-height: 100vh; }
    .recibo-header { 
      background: #111; padding: 14px 24px; display: flex; align-items: center; 
      justify-content: space-between; flex-wrap: wrap; gap: 12px;
    }
    .recibo-header-left { display: flex; align-items: center; gap: 14px; }
    .recibo-header-right { display: flex; gap: 10px; align-items: center; }
    .btn-back { background: transparent; border: 1.5px solid #555; color: #ccc; padding: 8px 14px; border-radius: 7px; cursor: pointer; font-size: 13px; font-family: inherit; }
    .btn-back:hover { background: #222; }
    .recibo-title { color: #fff; font-weight: 600; font-size: 14px; letter-spacing: 0.5px; }
    .date-input-dark { padding: 8px 12px; border-radius: 7px; border: 1.5px solid #444; background: #222; color: #fff; font-size: 13px; font-family: inherit; }
    
    .recibo-preview { display: flex; justify-content: center; padding: 32px 20px; overflow-x: auto; }
    .recibo-canvas-container { box-shadow: 0 4px 30px rgba(0,0,0,.18); border-radius: 4px; background: white; }
    
    .form-card { background: #fff; border-radius: 12px; padding: 32px; border: 1.5px solid #e8e8e8; }
    .form-card h2 { margin: 0 0 24px; font-size: 18px; font-weight: 700; }
    .form-field { margin-bottom: 16px; }
    .form-label { display: block; font-size: 12px; color: #666; margin-bottom: 5px; font-weight: 600; }
    .form-input { width: 100%; padding: 10px 14px; border-radius: 7px; border: 1.5px solid #ddd; font-size: 14px; font-family: inherit; }
    .form-select { width: 100%; padding: 10px 14px; border-radius: 7px; border: 1.5px solid #ddd; font-size: 14px; background: #fff; font-family: inherit; }
    .form-actions { display: flex; gap: 10px; }
    .form-actions button { flex: 1; padding: 12px; border-radius: 8px; font-size: 14px; font-family: inherit; }
    
    .hidden { display: none !important; }
  </style>
</head>
<body>

<div id="app"></div>

<script>
// ────────────────────────────────────────
// DATOS INICIALES
// ────────────────────────────────────────
const CLIENTES_INICIALES = [
  { id: 1, nombre: "Álvaro Álvarez Hernández", plan: "15 megas", monto: 400, formaPago: "Transferencia" },
  { id: 2, nombre: "María López Gómez", plan: "25 megas", monto: 550, formaPago: "Efectivo" },
  { id: 3, nombre: "Juan Pérez Ruiz", plan: "10 megas", monto: 300, formaPago: "Transferencia" },
];

const MESES = ["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];

// ────────────────────────────────────────
// UTILIDADES
// ────────────────────────────────────────
function formatearFecha(date) {
  return `${date.getDate()} de ${MESES[date.getMonth()]} de ${date.getFullYear()}`;
}

function periodoServicio(date) {
  const inicio = new Date(date);
  const fin = new Date(date);
  fin.setMonth(fin.getMonth() + 1);
  fin.setDate(fin.getDate() - 1);
  return `${inicio.getDate()} de ${MESES[inicio.getMonth()]} al ${fin.getDate()} de ${MESES[fin.getMonth()]}`;
}

// ────────────────────────────────────────
// GENERADOR DE CANVAS MEJORADO (Estilo Exacto de Imagen 2)
// ────────────────────────────────────────
function generarReciboCanvas(cliente, fecha) {
  const W = 794, H = 1123; // Dimensiones proporcionales A4
  const canvas = document.createElement("canvas");
  canvas.width = W * 2;
  canvas.height = H * 2;
  const ctx = canvas.getContext("2d");
  ctx.scale(2, 2);

  // Fondo Blanco Completo
  ctx.fillStyle = "#ffffff";
  ctx.fillRect(0, 0, W, H);

  // 1. HEADER GRIS (Inicia más a la derecha para respetar el bloque del logo)
  ctx.fillStyle = "#737170"; 
  ctx.fillRect(0, 45, W, 58);

  // 2. TEXTO "RECIBO DE PAGO"
  ctx.fillStyle = "#ffffff";
  ctx.font = "bold 24px 'Montserrat', Arial, sans-serif";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText("RECIBO DE PAGO", 240 + (W - 240) / 2, 45 + 58 / 2);

  // 3. CAJA NEGRA LOGO (Sobresale limpiamente hacia arriba y hacia abajo)
  ctx.fillStyle = "#000000";
  ctx.fillRect(52, 20, 140, 140);

  // Texto dentro de Caja Negra
  ctx.fillStyle = "#ffffff";
  ctx.textAlign = "center";
  ctx.textBaseline = "alphabetic";
  ctx.font = "900 38px 'Montserrat', Arial, sans-serif";
  ctx.letterSpacing = "2px";
  ctx.fillText("LUX", 122, 95);
  
  ctx.font = "500 10px 'Montserrat', Arial, sans-serif";
  ctx.fillStyle = "#bbbbbb";
  ctx.letterSpacing = "4px";
  ctx.fillText("SATELITAL", 124, 118);
  ctx.letterSpacing = "0px"; // Reset de espaciado

  // 4. DATOS SUPERIORES DERECHOS (Fecha, Recibo, Plan)
  const labelX = 520, valorX = 535, lineW = 205;

  function campoLinea(label, valor, y) {
    ctx.font = "500 14px 'Montserrat', Arial, sans-serif";
    ctx.fillStyle = "#333333";
    ctx.textAlign = "right";
    ctx.fillText(label, labelX, y);
    
    // Línea de valor
    ctx.strokeStyle = "#b5b5b5";
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(valorX, y + 4);
    ctx.lineTo(valorX + lineW, y + 4);
    ctx.stroke();
    
    ctx.font = "500 14px 'Montserrat', Arial, sans-serif";
    ctx.fillStyle = "#111111";
    ctx.textAlign = "left";
    ctx.fillText(valor, valorX + 4, y);
  }

  campoLinea("Fecha", formatearFecha(fecha), 215);
  campoLinea("Recibo", cliente.nombre, 255);
  campoLinea("Plan Adquirido", cliente.plan, 295);

  // 5. CUERPO CENTRAL DEL RECIBO
  const lx = 52; // Margen izquierdo alineado con la caja del logo

  function lineaTexto(label, valor, y, CustomWidthLine) {
    ctx.font = "500 14px 'Montserrat', Arial, sans-serif";
    ctx.fillStyle = "#222222";
    ctx.textAlign = "left";
    ctx.fillText(label, lx, y);
    
    const textW = ctx.measureText(label).width;
    const startLine = lx + textW + 12;
    const endLine = CustomWidthLine ? (startLine + CustomWidthLine) : (W - lx);

    ctx.strokeStyle = "#b5b5b5";
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(startLine, y + 4);
    ctx.lineTo(endLine, y + 4);
    ctx.stroke();

    ctx.font = "500 14px 'Montserrat', Arial, sans-serif";
    ctx.fillStyle = "#111111";
    ctx.fillText(valor, startLine + 8, y);
    return endLine;
  }

  // Recibí de
  lineaTexto("Recibí de", "Servicio de Internet Satelital", 370);

  // La suma de + Forma de pago en la misma fila
  const endSumaX = lineaTexto("La suma de", `$${cliente.monto}`, 430, 160);
  
  // Posicionamos forma de pago consecutivamente
  const fpLabelX = endSumaX + 20;
  ctx.font = "500 14px 'Montserrat', Arial, sans-serif";
  ctx.fillStyle = "#222222";
  ctx.fillText("Forma de pago", fpLabelX, 430);
  
  const fpLabelW = ctx.measureText("Forma de pago").width;
  const fpLineStart = fpLabelX + fpLabelW + 12;
  const fpLineEnd = W - lx;
  
  ctx.strokeStyle = "#b5b5b5";
  ctx.beginPath();
  ctx.moveTo(fpLineStart, 434);
  ctx.lineTo(fpLineEnd, 434);
  ctx.stroke();
  
  ctx.fillStyle = "#111111";
  ctx.fillText(cliente.formaPago, fpLineStart + 8, 430);

  // Por el trabajo realizado
  lineaTexto("Por el trabajo realizado:", "servicio de internet", 490);

  // 6. LÍNEAS SEPARADORAS DECORATIVAS CENTRALES
  ctx.setLineDash([3, 4]);
  ctx.strokeStyle = "#999999";
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(lx, 530);
  ctx.lineTo(W - lx, 530);
  ctx.stroke();
  ctx.setLineDash([]); // Quitar punteado

  ctx.strokeStyle = "#737170";
  ctx.lineWidth = 1.2;
  ctx.beginPath();
  ctx.moveTo(lx, 542);
  ctx.lineTo(W - lx, 542);
  ctx.stroke();

  // Correspondiente al periodo de
  lineaTexto("Correspondiente al periodo de", periodoServicio(fecha), 585);

  // 7. SECCIÓN DE FIRMA CURSIVA ELEGANTE
  // Nombre Cursivo sin líneas rígidas encima
  ctx.font = "normal 42px 'Great Vibes', cursive";
  ctx.fillStyle = "#000000";
  ctx.textAlign = "center";
  ctx.fillText("Lux Satelital", W / 2, 700);

  // Pequeña línea sutil para delimitación inferior de firma
  ctx.strokeStyle = "#b5b5b5";
  ctx.lineWidth = 0.8;
  ctx.beginPath();
  ctx.moveTo(W / 2 - 120, 715);
  ctx.lineTo(W / 2 + 120, 715);
  ctx.stroke();

  ctx.font = "500 12px 'Montserrat', Arial, sans-serif";
  ctx.fillStyle = "#666666";
  ctx.fillText("Firma y aclaración", W / 2, 735);
  ctx.fillText("receptor", W / 2, 752);

  // 8. FOOTER MODERNO
  // Línea gris superior del footer
  ctx.fillStyle = "#737170";
  ctx.fillRect(0, H - 150, W, 26);

  // Bloque de Contacto inferior
  ctx.font = "bold 15px 'Montserrat', Arial, sans-serif";
  ctx.fillStyle = "#000000";
  ctx.fillText("CONTACTO", W / 2, H - 85);

  // Dibujo del Icono de WhatsApp desde SVG oficial de forma nativa en Canvas
  ctx.font = "bold 18px 'Montserrat', Arial, sans-serif";
  ctx.fillStyle = "#000000";
  
  // Renderizamos el texto de número telefónico un poco desplazado para meter el logo de WhatsApp antes
  const tNum = "961 269 75 67";
  ctx.font = "700 18px 'Montserrat', Arial, sans-serif";
  const numW = ctx.measureText(tNum).width;
  
  const startXImg = (W / 2) - (numW / 2) - 14; 
  ctx.textAlign = "left";
  ctx.fillText(tNum, startXImg + 26, H - 48);

  // Cargamos y pintamos el icono de WhatsApp en vectores / imagen transparente
  const imgWA = new Image();
  imgWA.crossOrigin = "anonymous";
  imgWA.src = "https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg";
  // Si la imagen ya está en caché se dibuja de inmediato
  if (imgWA.complete) {
    ctx.drawImage(imgWA, startXImg, H - 64, 20, 20);
  } else {
    imgWA.onload = function() {
      ctx.drawImage(imgWA, startXImg, H - 64, 20, 20);
      // Forzar refresco en la vista si hace falta
      const preview = document.getElementById('previewCanvas');
      if (preview && app.vista === 'recibo') {
        const previewCtx = preview.getContext('2d');
        previewCtx.drawImage(canvas, 0, 0, preview.width, preview.height);
      }
    };
  }

  return canvas;
}

// ────────────────────────────────────────
// STATE MANAGEMENT (Gestión de la Aplicación)
// ────────────────────────────────────────
const app = {
  clientes: [...CLIENTES_INICIALES],
  vista: 'lista', // 'lista', 'recibo', 'nuevo'
  seleccionado: null,
  busqueda: '',
  fecha: new Date().toISOString().split('T')[0],
  nuevoForm: { nombre: '', plan: '', monto: '', formaPago: 'Transferencia' },

  setVista(v) { this.vista = v; this.render(); },
  setSeleccionado(c) { this.seleccionado = c; this.setVista('recibo'); },
  setBusqueda(b) { this.busqueda = b; this.render(); },
  setFecha(f) { this.fecha = f; this.render(); },
  
  agregarCliente() {
    const f = this.nuevoForm;
    if (!f.nombre || !f.plan || !f.monto) return alert('Completa todos los campos');
    this.clientes.push({ id: Date.now(), nombre: f.nombre, plan: f.plan, monto: Number(f.monto), formaPago: f.formaPago });
    this.nuevoForm = { nombre: '', plan: '', monto: '', formaPago: 'Transferencia' };
    this.setVista('lista');
  },

  eliminarCliente(id) {
    if (!confirm('¿Eliminar este cliente?')) return;
    this.clientes = this.clientes.filter(c => c.id !== id);
    if (this.seleccionado?.id === id) { this.seleccionado = null; this.setVista('lista'); }
  },

  descargarRecibo() {
    try {
      const canvas = generarReciboCanvas(this.seleccionado, new Date(this.fecha + 'T12:00:00'));
      const link = document.createElement('a');
      link.download = `Recibo_${this.seleccionado.nombre.replace(/ /g,'_')}_${this.fecha}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
    } catch(e) {
      alert('Error al descargar: ' + e.message);
    }
  },

  render() {
    const html = this.vista === 'lista' ? this.renderLista() : this.vista === 'nuevo' ? this.renderNuevo() : this.renderRecibo();
    document.getElementById('app').innerHTML = html;
    this.attachEvents();
  },

  renderLista() {
    const filtrados = this.clientes.filter(c => c.nombre.toLowerCase().includes(this.busqueda.toLowerCase()));
    const items = filtrados.map(c => `
      <div class="cliente-item">
        <div class="cliente-info">
          <h3>${c.nombre}</h3>
          <p>${c.plan} · $${c.monto} · ${c.formaPago}</p>
        </div>
        <div class="cliente-actions">
          <button class="btn-small" onclick="app.setSeleccionado(app.clientes.find(x=>x.id===${c.id}))">Ver recibo</button>
          <button class="btn-danger" onclick="app.eliminarCliente(${c.id})">✕</button>
        </div>
      </div>
    `).join('');

    return `
      <div class="main">
        <div class="header">
          <div class="header-logo">
            <div class="name">LUX</div>
            <div class="sub">SATELITAL</div>
          </div>
          <div class="header-divider"></div>
          <div class="header-title">GENERADOR DE RECIBOS</div>
        </div>
        <div class="content">
          <div class="form-group">
            <input type="text" class="search-input" id="busqueda" placeholder="🔍  Buscar cliente..." value="${this.busqueda}">
            <button class="btn-primary" onclick="app.setVista('nuevo')">+ Nuevo cliente</button>
          </div>
          <div class="date-section" style="margin-bottom: 24px;">
            <label class="date-label">Fecha del recibo:</label>
            <input type="date" class="date-input" id="fecha" value="${this.fecha}">
          </div>
          <div class="clientes-list">
            ${items.length ? items : '<div class="empty-state">No se encontraron clientes</div>'}
          </div>
        </div>
      </div>
    `;
  },

  renderNuevo() {
    const f = this.nuevoForm;
    return `
      <div class="main">
        <div class="header">
          <div class="header-logo">
            <div class="name">LUX</div>
            <div class="sub">SATELITAL</div>
          </div>
          <div class="header-divider"></div>
          <span class="header-title">NUEVO CLIENTE</span>
        </div>
        <div class="content">
          <div class="form-card">
            <h2>Agregar cliente</h2>
            <div class="form-field">
              <label class="form-label">Nombre completo</label>
              <input type="text" class="form-input" id="nombre" placeholder="Ej. Juan Pérez Ruiz" value="${f.nombre}">
            </div>
            <div class="form-field">
              <label class="form-label">Plan contratado</label>
              <input type="text" class="form-input" id="plan" placeholder="Ej. 25 megas" value="${f.plan}">
            </div>
            <div class="form-field">
              <label class="form-label">Monto mensual (\$)</label>
              <input type="number" class="form-input" id="monto" placeholder="Ej. 400" value="${f.monto}">
            </div>
            <div class="form-field">
              <label class="form-label">Forma de pago</label>
              <select class="form-select" id="formaPago">
                <option ${f.formaPago==='Transferencia'?'selected':''}>Transferencia</option>
                <option ${f.formaPago==='Efectivo'?'selected':''}>Efectivo</option>
                <option ${f.formaPago==='Depósito'?'selected':''}>Depósito</option>
                <option ${f.formaPago==='Tarjeta'?'selected':''}>Tarjeta</option>
              </select>
            </div>
            <div class="form-actions">
              <button class="btn-primary" onclick="app.setVista('lista')" style="background:#ddd;color:#333">Cancelar</button>
              <button class="btn-primary" onclick="app.guardarFormulario()">Guardar cliente</button>
            </div>
          </div>
        </div>
      </div>
    `;
  },

  renderRecibo() {
    const c = this.seleccionado;
    return `
      <div class="recibo-view">
        <div class="recibo-header">
          <div class="recibo-header-left">
            <button class="btn-back" onclick="app.setVista('lista')">← Volver</button>
            <span class="recibo-title">${c.nombre}</span>
          </div>
          <div class="recibo-header-right">
            <input type="date" class="date-input-dark" id="fecha" value="${this.fecha}">
            <button class="btn-secondary" onclick="app.descargarRecibo()" id="btnDescargar">⬇ Descargar recibo</button>
          </div>
        </div>
        <div class="recibo-preview">
          <canvas id="previewCanvas" class="recibo-canvas-container" width="1588" height="2246" style="max-width:100%; height:auto;"></canvas>
        </div>
      </div>
    `;
  },

  guardarFormulario() {
    const nombre = document.getElementById('nombre').value;
    const plan = document.getElementById('plan').value;
    const monto = document.getElementById('monto').value;
    const formaPago = document.getElementById('formaPago').value;
    this.nuevoForm = { nombre, plan, monto, formaPago };
    this.agregarCliente();
  },

  attachEvents() {
    if (document.getElementById('busqueda')) {
      document.getElementById('busqueda').addEventListener('input', e => this.setBusqueda(e.target.value));
    }
    if (document.getElementById('fecha')) {
      document.getElementById('fecha').addEventListener('change', e => this.setFecha(e.target.value));
    }
    if (this.vista === 'recibo' && document.getElementById('previewCanvas')) {
      const canvas = generarReciboCanvas(this.seleccionado, new Date(this.fecha + 'T12:00:00'));
      const preview = document.getElementById('previewCanvas');
      const ctx = preview.getContext('2d');
      ctx.drawImage(canvas, 0, 0, preview.width, preview.height);
    }
  }
};

// Asegurar que las fuentes externas de Google Fonts estén totalmente cargadas antes del primer renderizado del canvas
document.fonts.ready.then(() => {
  app.render();
});
</script>

</body>
</html>
