<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generador de Recibos - Lux Satelital</title>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Montserrat', 'Helvetica Neue', Arial, sans-serif; background: #f5f5f5; }
    .container { width: 100%; }
    .header { background: #111; padding: 16px 28px; display: flex; align-items: center; gap: 14px; color: #fff; }
    .header-logo { display: flex; flex-direction: column; }
    .header-logo .name { font-size: 22px; font-weight: 900; letter-spacing: 3px; }
    .header-logo .sub { font-size: 9px; letter-spacing: 4px; color: #aaa; }
    .header-divider { width: 1px; height: 40px; background: #444; }
    .header-title { color: #ddd; font-size: 13px; font-weight: 500; letter-spacing: 1px; }

    .content { max-width: 680px; margin: 0 auto; padding: 32px 20px; }
    .main { background: #f5f5f5; min-height: 100vh; }

    .form-group { margin-bottom: 12px; display: flex; gap: 10px; flex-wrap: wrap; }
    .search-input { flex: 1; min-width: 200px; padding: 12px 16px; border-radius: 8px; border: 1.5px solid #ddd; font-size: 14px; font-family: inherit; }
    .btn-primary { background: #111; color: #fff; padding: 12px 20px; border-radius: 8px; border: none; cursor: pointer; font-size: 14px; font-weight: 600; white-space: nowrap; font-family: inherit; transition: 0.2s; }
    .btn-primary:hover { background: #333; }
    .btn-secondary { background: #fff; color: #111; padding: 10px 22px; border-radius: 7px; border: none; cursor: pointer; font-size: 14px; font-weight: 700; font-family: inherit; transition: 0.2s; }
    .btn-secondary:hover { background: #eee; }
    .btn-danger { background: #fff; color: #c00; padding: 9px 14px; border-radius: 7px; border: 1.5px solid #eee; cursor: pointer; font-size: 13px; font-family: inherit; transition: 0.2s; }
    .btn-danger:hover { background: #ffe0e0; }
    .btn-edit { background: #fff; color: #555; padding: 9px 14px; border-radius: 7px; border: 1.5px solid #eee; cursor: pointer; font-size: 13px; font-family: inherit; transition: 0.2s; }
    .btn-edit:hover { background: #f5f5f5; border-color: #ccc; }
    .btn-small { background: #111; color: #fff; padding: 9px 18px; border-radius: 7px; border: none; cursor: pointer; font-size: 13px; font-weight: 600; font-family: inherit; transition: 0.2s; }
    .btn-small:hover { background: #333; }

    .date-section { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .date-label { font-size: 13px; color: #555; white-space: nowrap; font-weight: 500; }
    .date-input { padding: 8px 12px; border-radius: 8px; border: 1.5px solid #ddd; font-size: 13px; font-family: inherit; }

    /* Filtro de pago */
    .filter-tabs { display: flex; gap: 6px; margin-bottom: 20px; }
    .filter-tab { padding: 7px 16px; border-radius: 20px; border: 1.5px solid #ddd; background: #fff; font-size: 13px; font-family: inherit; cursor: pointer; font-weight: 600; color: #666; transition: 0.2s; }
    .filter-tab.active { background: #111; color: #fff; border-color: #111; }
    .filter-tab:hover:not(.active) { background: #f0f0f0; }

    /* Badge de zona */
    .zona-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; letter-spacing: 0.5px; margin-top: 4px; }
    .zona-mayo { background: #e8f4e8; color: #2d7a2d; }
    .zona-ninos { background: #e8eef8; color: #2d4d8a; }

    .clientes-list { display: flex; flex-direction: column; gap: 10px; }
    .cliente-item {
      background: #fff; border-radius: 10px; border: 1.5px solid #e8e8e8; padding: 16px 20px;
      display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,.02);
      transition: transform 0.1s;
    }
    .cliente-item:hover { transform: translateY(-1px); border-color: #ddd; }
    .cliente-info h3 { font-weight: 700; font-size: 15px; color: #111; }
    .cliente-info p { color: #666; font-size: 13px; margin-top: 4px; font-weight: 500; }
    .cliente-actions { display: flex; gap: 8px; flex-shrink: 0; }

    .empty-state { text-align: center; color: #aaa; padding: 40px 0; font-size: 14px; }

    /* Recibo */
    .recibo-view { background: #e8e8e8; min-height: 100vh; }
    .recibo-header {
      background: #111; padding: 14px 24px; display: flex; align-items: center;
      justify-content: space-between; flex-wrap: wrap; gap: 12px;
    }
    .recibo-header-left { display: flex; align-items: center; gap: 14px; }
    .recibo-header-right { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .btn-back { background: transparent; border: 1.5px solid #555; color: #ccc; padding: 8px 14px; border-radius: 7px; cursor: pointer; font-size: 13px; font-family: inherit; }
    .btn-back:hover { background: #222; color: #fff; border-color: #777; }
    .recibo-title { color: #fff; font-weight: 600; font-size: 14px; letter-spacing: 0.5px; }
    .date-input-dark { padding: 8px 12px; border-radius: 7px; border: 1.5px solid #444; background: #222; color: #fff; font-size: 13px; font-family: inherit; }

    .recibo-preview { display: flex; justify-content: center; padding: 32px 20px; overflow-x: auto; }
    .recibo-canvas-container { box-shadow: 0 10px 40px rgba(0,0,0,.15); border-radius: 4px; max-width: 100%; height: auto; background: #fff; }

    /* Formulario (nuevo / editar) */
    .form-card { background: #fff; border-radius: 12px; padding: 32px; border: 1.5px solid #e8e8e8; box-shadow: 0 4px 12px rgba(0,0,0,.03); }
    .form-card h2 { margin: 0 0 24px; font-size: 18px; font-weight: 700; color: #111; }
    .form-field { margin-bottom: 16px; }
    .form-label { display: block; font-size: 12px; color: #666; margin-bottom: 6px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
    .form-input { width: 100%; padding: 12px 14px; border-radius: 7px; border: 1.5px solid #ddd; font-size: 14px; font-family: inherit; transition: 0.2s; }
    .form-input:focus { border-color: #111; outline: none; }
    .form-select { width: 100%; padding: 12px 14px; border-radius: 7px; border: 1.5px solid #ddd; font-size: 14px; background: #fff; font-family: inherit; cursor: pointer; }
    .form-actions { display: flex; gap: 10px; margin-top: 24px; }
    .form-actions button { flex: 1; padding: 12px; border-radius: 8px; font-size: 14px; font-family: inherit; }

    /* Monto helper */
    .monto-hint { font-size: 11px; color: #888; margin-top: 6px; font-weight: 500; }
    .monto-hint span { font-weight: 700; color: #555; }

    .hidden { display: none !important; }
  </style>
</head>
<body>
<div id="app"></div>
<script>
// ────────────────────────────────────────
// MAPA DE PLANES (monto → megas)
// ────────────────────────────────────────
const PLANES = {
  250: "8 Megas",
  300: "10 Megas",
  350: "10 Megas",
  400: "15 Megas",
  480: "20 Megas"
};

function megasPorMonto(monto) {
  return PLANES[Number(monto)] || `Plan ${monto}`;
}

// ────────────────────────────────────────

  { id: 32, nombre: "Alejandro Hernández Hernández",       zona: "Zona Niños Héroes",  monto: 300, formaPago: "Efectivo" }

const MESES = ["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];

function formatearFecha(date) {
  return `${date.getDate()} de ${MESES[date.getMonth()]} de ${date.getFullYear()}`;
}

function periodoServicio(date) {
  const inicio = new Date(date);
  const fin = new Date(date);
  fin.setMonth(fin.getMonth() + 1);
  fin.setDate(fin.getDate() - 1);
  return `${inicio.getDate()} de ${MESES[inicio.getMonth()]} al ${fin.getDate()} de ${MESES[fin.getMonth()]}`;
}

// ────────────────────────────────────────
// GENERADOR DE CANVAS
// ────────────────────────────────────────
function generarReciboCanvas(cliente, fecha) {
  const W = 794, H = 1123;
  const canvas = document.createElement("canvas");
  canvas.width = W * 2;
  canvas.height = H * 2;
  const ctx = canvas.getContext("2d");
  ctx.scale(2, 2);

  // Fondo
  ctx.fillStyle = "#ffffff";
  ctx.fillRect(0, 0, W, H);

  // Barra gris superior
  ctx.fillStyle = "#737170";
  ctx.fillRect(0, 105, W, 76);

  // Título
  ctx.fillStyle = "#ffffff";
  ctx.font = "600 32px 'Montserrat', sans-serif";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText("RECIBO DE PAGO", 280 + (W - 280) / 2, 105 + 76 / 2);

  // Caja negra logo
  ctx.fillStyle = "#000000";
  ctx.fillRect(88, 55, 190, 190);
  ctx.fillStyle = "#ffffff";
  ctx.textAlign = "center";
  ctx.textBaseline = "alphabetic";
  ctx.font = "900 56px 'Montserrat', sans-serif";
  ctx.fillText("LUX", 185, 155);
  ctx.font = "600 13px 'Montserrat', sans-serif";
  ctx.fillStyle = "#c0c0c0";
  ctx.fillText("SATELITAL", 188, 188);

  // Datos laterales
  const labelX = 600, valorX = 620, maxRight = W - 88;

  function campoLinea(label, valor, y) {
    ctx.font = "600 16px 'Montserrat', sans-serif";
    ctx.fillStyle = "#333333";
    ctx.textAlign = "right";
    ctx.fillText(label, labelX, y);
    ctx.strokeStyle = "#cccccc";
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(valorX, y + 4);
    ctx.lineTo(maxRight, y + 4);
    ctx.stroke();
    ctx.font = "500 16px 'Montserrat', sans-serif";
    ctx.fillStyle = "#000000";
    ctx.textAlign = "left";
    ctx.fillText(valor, valorX + 6, y);
  }

  campoLinea("Fecha", formatearFecha(fecha), 285);
  campoLinea("Recibo a", cliente.nombre, 330);
  // Plan con megas
  campoLinea("Plan Adquirido", megasPorMonto(cliente.monto), 375);

  // Estructura central
  const lx = 88;

  function lineaTexto(label, valor, y, customWidth) {
    ctx.font = "600 16px 'Montserrat', sans-serif";
    ctx.fillStyle = "#333333";
    ctx.textAlign = "left";
    ctx.fillText(label, lx, y);
    const textW = ctx.measureText(label).width;
    const startLine = lx + textW + 14;
    const endLine = customWidth ? (startLine + customWidth) : maxRight;
    ctx.strokeStyle = "#cccccc";
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(startLine, y + 4);
    ctx.lineTo(endLine, y + 4);
    ctx.stroke();
    ctx.font = "500 16px 'Montserrat', sans-serif";
    ctx.fillStyle = "#000000";
    ctx.fillText(valor, startLine + 10, y);
    return endLine;
  }

  lineaTexto("Recibí de", "Servicio de Internet Satelital", 465);

  const endSumaX = lineaTexto("La suma de", `$${cliente.monto}`, 535, 200);
  const fpLabelX = endSumaX + 28;
  ctx.font = "600 16px 'Montserrat', sans-serif";
  ctx.fillStyle = "#333333";
  ctx.fillText("Forma de pago", fpLabelX, 535);
  const fpLabelW = ctx.measureText("Forma de pago").width;
  const fpLineStart = fpLabelX + fpLabelW + 14;
  ctx.strokeStyle = "#cccccc";
  ctx.beginPath();
  ctx.moveTo(fpLineStart, 539);
  ctx.lineTo(maxRight, 539);
  ctx.stroke();
  ctx.fillStyle = "#000000";
  ctx.font = "500 16px 'Montserrat', sans-serif";
  ctx.fillText(cliente.formaPago, fpLineStart + 10, 535);

  lineaTexto("Por el trabajo realizado:", "servicio de internet", 605);

  // Separadores
  ctx.setLineDash([4, 5]);
  ctx.strokeStyle = "#aaaaaa";
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(lx, 655);
  ctx.lineTo(maxRight, 655);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.strokeStyle = "#737170";
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(lx, 672);
  ctx.lineTo(maxRight, 672);
  ctx.stroke();

  lineaTexto("Correspondiente al periodo de", periodoServicio(fecha), 735);

  // Firma
  ctx.font = "normal 58px 'Great Vibes', cursive";
  ctx.fillStyle = "#000000";
  ctx.textAlign = "center";
  ctx.fillText("Lux Satelital", W / 2, 875);
  ctx.strokeStyle = "#cccccc";
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(W / 2 - 140, 895);
  ctx.lineTo(W / 2 + 140, 895);
  ctx.stroke();
  ctx.font = "500 13px 'Montserrat', sans-serif";
  ctx.fillStyle = "#777777";
  ctx.fillText("Firma y aclaración", W / 2, 920);
  ctx.fillText("receptor", W / 2, 940);

  // Pie
  ctx.fillStyle = "#737170";
  ctx.fillRect(0, H - 175, W, 36);
  ctx.font = "800 18px 'Montserrat', sans-serif";
  ctx.fillStyle = "#000000";
  ctx.fillText("CONTACTO", W / 2, H - 100);

  const telefono = "961 269 75 67";
  ctx.font = "700 22px 'Montserrat', sans-serif";
  const telW = ctx.measureText(telefono).width;
  const startXImg = (W / 2) - (telW / 2) - 18;
  ctx.textAlign = "left";
  ctx.fillStyle = "#111111";
  ctx.fillText(telefono, startXImg + 36, H - 52);

  const imgWA = new Image();
  imgWA.crossOrigin = "anonymous";
  imgWA.src = "https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg";
  if (imgWA.complete) {
    ctx.drawImage(imgWA, startXImg, H - 74, 26, 26);
  } else {
    imgWA.onload = function() {
      ctx.drawImage(imgWA, startXImg, H - 74, 26, 26);
      const preview = document.getElementById('previewCanvas');
      if (preview && app.vista === 'recibo') {
        const previewCtx = preview.getContext('2d');
        previewCtx.drawImage(canvas, 0, 0, preview.width, preview.height);
      }
    };
  }

  return canvas;
}

// ────────────────────────────────────────
// STATE & UI
// ────────────────────────────────────────
const app = {
  clientes: [...CLIENTES_INICIALES],
  vista: 'lista',        // 'lista' | 'nuevo' | 'editar' | 'recibo'
  seleccionado: null,
  editandoId: null,
  busqueda: '',
  filtroFP: 'todos',     // 'todos' | 'Efectivo' | 'Transferencia'
  fecha: new Date().toISOString().split('T')[0],
  form: { nombre: '', zona: 'Zona 1º de Mayo', monto: '', formaPago: 'Efectivo' },

  setVista(v) { this.vista = v; this.render(); },
  setSeleccionado(c) { this.seleccionado = c; this.setVista('recibo'); },
  setBusqueda(b) { this.busqueda = b; this.render(); },
  setFiltroFP(f) { this.filtroFP = f; this.render(); },
  setFecha(f) { this.fecha = f; this.render(); },

  abrirNuevo() {
    this.form = { nombre: '', zona: 'Zona 1º de Mayo', monto: '', formaPago: 'Efectivo' };
    this.editandoId = null;
    this.setVista('nuevo');
  },

  abrirEditar(id) {
    const c = this.clientes.find(x => x.id === id);
    if (!c) return;
    this.form = { nombre: c.nombre, zona: c.zona, monto: String(c.monto), formaPago: c.formaPago };
    this.editandoId = id;
    this.setVista('editar');
  },

  guardarFormulario() {
    const nombre = document.getElementById('fn_nombre').value.trim();
    const zona   = document.getElementById('fn_zona').value;
    const monto  = document.getElementById('fn_monto').value;
    const formaPago = document.getElementById('fn_formaPago').value;
    if (!nombre || !monto) return alert('Completa nombre y monto.');
    this.form = { nombre, zona, monto, formaPago };

    if (this.editandoId !== null) {
      // Editar existente
      const idx = this.clientes.findIndex(x => x.id === this.editandoId);
      if (idx !== -1) {
        this.clientes[idx] = { ...this.clientes[idx], nombre, zona, monto: Number(monto), formaPago };
        // Si estaba viendo el recibo de este cliente, actualizar referencia
        if (this.seleccionado?.id === this.editandoId) {
          this.seleccionado = this.clientes[idx];
        }
      }
      this.editandoId = null;
    } else {
      // Nuevo cliente
      this.clientes.unshift({ id: Date.now(), nombre, zona, monto: Number(monto), formaPago });
    }
    this.setVista('lista');
  },

  eliminarCliente(id) {
    if (!confirm('¿Eliminar este cliente?')) return;
    this.clientes = this.clientes.filter(c => c.id !== id);
    if (this.seleccionado?.id === id) { this.seleccionado = null; this.setVista('lista'); }
    else this.render();
  },

  descargarRecibo() {
    try {
      const canvas = generarReciboCanvas(this.seleccionado, new Date(this.fecha + 'T12:00:00'));
      const link = document.createElement('a');
      link.download = `Recibo_${this.seleccionado.nombre.replace(/ /g,'_')}_${this.fecha}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
    } catch(e) {
      alert('Error al generar descarga: ' + e.message);
    }
  },

  // ── RENDER ──────────────────────────────
  render() {
    const map = { lista: () => this.renderLista(), nuevo: () => this.renderForm(false), editar: () => this.renderForm(true), recibo: () => this.renderRecibo() };
    document.getElementById('app').innerHTML = (map[this.vista] || map.lista)();
    this.attachEvents();
  },

  renderLista() {
    let filtrados = this.clientes.filter(c => c.nombre.toLowerCase().includes(this.busqueda.toLowerCase()));
    if (this.filtroFP !== 'todos') filtrados = filtrados.filter(c => c.formaPago === this.filtroFP);

    const badge = (zona) => zona.includes('Niños')
      ? `<span class="zona-badge zona-ninos">Niños Héroes</span>`
      : `<span class="zona-badge zona-mayo">1º de Mayo</span>`;

    const items = filtrados.map(c => `
      <div class="cliente-item">
        <div class="cliente-info">
          <h3>${c.nombre}</h3>
          <p>${megasPorMonto(c.monto)} · $${c.monto} · ${c.formaPago}</p>
          ${badge(c.zona)}
        </div>
        <div class="cliente-actions">
          <button class="btn-small" onclick="app.setSeleccionado(app.clientes.find(x=>x.id===${c.id}))">Ver recibo</button>
          <button class="btn-edit" title="Editar" onclick="app.abrirEditar(${c.id})">✏️</button>
          <button class="btn-danger" title="Eliminar" onclick="app.eliminarCliente(${c.id})">✕</button>
        </div>
      </div>
    `).join('');

    const tabs = ['todos','Efectivo','Transferencia'].map(f => {
      const label = f === 'todos' ? 'Todos' : f;
      return `<button class="filter-tab ${this.filtroFP===f?'active':''}" onclick="app.setFiltroFP('${f}')">${label}</button>`;
    }).join('');

    return `
      <div class="main">
        <div class="header">
          <div class="header-logo"><div class="name">LUX</div><div class="sub">SATELITAL</div></div>
          <div class="header-divider"></div>
          <div class="header-title">GENERADOR DE RECIBOS</div>
        </div>
        <div class="content">
          <div class="form-group">
            <input type="text" class="search-input" id="busqueda" placeholder="🔍 Buscar cliente..." value="${this.busqueda}">
            <button class="btn-primary" onclick="app.abrirNuevo()">+ Nuevo cliente</button>
          </div>
          <div class="date-section" style="margin-bottom: 16px;">
            <label class="date-label">Fecha de emisión:</label>
            <input type="date" class="date-input" id="fecha" value="${this.fecha}">
          </div>
          <div class="filter-tabs">${tabs}</div>
          <div class="clientes-list">
            ${items.length ? items : '<div class="empty-state">No se encontraron clientes.</div>'}
          </div>
        </div>
      </div>
    `;
  },

  renderForm(esEdicion) {
    const f = this.form;
    const titulo = esEdicion ? 'Editar cliente' : 'Registrar cliente';
    const btnLabel = esEdicion ? 'Guardar cambios' : 'Guardar cliente';

    const montoHints = Object.entries(PLANES).map(([m,p]) => `$${m} → ${p}`).join(' &nbsp;|&nbsp; ');

    return `
      <div class="main">
        <div class="header">
          <div class="header-logo"><div class="name">LUX</div><div class="sub">SATELITAL</div></div>
          <div class="header-divider"></div>
          <span class="header-title">${titulo.toUpperCase()}</span>
        </div>
        <div class="content">
          <div class="form-card">
            <h2>${titulo}</h2>
            <div class="form-field">
              <label class="form-label">Nombre completo</label>
              <input type="text" class="form-input" id="fn_nombre" placeholder="Ej. Juan Pérez Ruiz" value="${f.nombre}">
            </div>
            <div class="form-field">
              <label class="form-label">Zona</label>
              <select class="form-select" id="fn_zona">
                <option ${f.zona==='Zona 1º de Mayo'?'selected':''}>Zona 1º de Mayo</option>
                <option ${f.zona==='Zona Niños Héroes'?'selected':''}>Zona Niños Héroes</option>
              </select>
            </div>
            <div class="form-field">
              <label class="form-label">Monto mensual ($)</label>
              <select class="form-select" id="fn_monto">
                ${Object.keys(PLANES).map(m => `<option value="${m}" ${String(f.monto)===String(m)?'selected':''}>${m} — ${PLANES[m]}</option>`).join('')}
                <option value="custom_${f.monto}" ${!PLANES[f.monto]&&f.monto?'selected':''}>Otro monto${!PLANES[f.monto]&&f.monto?' ($'+f.monto+')':''}</option>
              </select>
              <p class="monto-hint">Planes: ${montoHints}</p>
            </div>
            <div class="form-field">
              <label class="form-label">Forma de pago</label>
              <select class="form-select" id="fn_formaPago">
                <option ${f.formaPago==='Efectivo'?'selected':''}>Efectivo</option>
                <option ${f.formaPago==='Transferencia'?'selected':''}>Transferencia</option>
                <option ${f.formaPago==='Depósito'?'selected':''}>Depósito</option>
                <option ${f.formaPago==='Tarjeta'?'selected':''}>Tarjeta</option>
              </select>
            </div>
            <div class="form-actions">
              <button class="btn-primary" style="background:#f0f0f0;color:#333;border:1.5px solid #ddd;" onclick="app.setVista('lista')">Cancelar</button>
              <button class="btn-primary" onclick="app.guardarFormulario()">${btnLabel}</button>
            </div>
          </div>
        </div>
      </div>
    `;
  },

  renderRecibo() {
    const c = this.seleccionado;
    return `
      <div class="recibo-view">
        <div class="recibo-header">
          <div class="recibo-header-left">
            <button class="btn-back" onclick="app.setVista('lista')">← Volver al listado</button>
            <span class="recibo-title">Recibo: ${c.nombre}</span>
          </div>
          <div class="recibo-header-right">
            <input type="date" class="date-input-dark" id="fecha" value="${this.fecha}">
            <button class="btn-edit" style="background:#222;border-color:#444;color:#ccc;" onclick="app.abrirEditar(${c.id})">✏️ Editar cliente</button>
            <button class="btn-secondary" onclick="app.descargarRecibo()">⬇ Descargar imagen</button>
          </div>
        </div>
        <div class="recibo-preview">
          <canvas id="previewCanvas" class="recibo-canvas-container" width="1588" height="2246"></canvas>
        </div>
      </div>
    `;
  },

  attachEvents() {
    const busq = document.getElementById('busqueda');
    if (busq) busq.addEventListener('input', e => this.setBusqueda(e.target.value));

    const fecha = document.getElementById('fecha');
    if (fecha) fecha.addEventListener('change', e => this.setFecha(e.target.value));

    if (this.vista === 'recibo') {
      const canvas = generarReciboCanvas(this.seleccionado, new Date(this.fecha + 'T12:00:00'));
      const preview = document.getElementById('previewCanvas');
      if (preview) {
        const ctx = preview.getContext('2d');
        ctx.drawImage(canvas, 0, 0, preview.width, preview.height);
      }
    }

    // Monto select: si elige "custom", pedir valor manualmente
    const montoSel = document.getElementById('fn_monto');
    if (montoSel) {
      montoSel.addEventListener('change', e => {
        if (e.target.value.startsWith('custom_')) {
          const val = prompt('Ingresa el monto personalizado ($):');
          if (val && !isNaN(val)) {
            this.form.monto = val;
            // Actualizar select visualmente
            const opt = document.createElement('option');
            opt.value = val;
            opt.textContent = `$${val} — Monto personalizado`;
            opt.selected = true;
            montoSel.appendChild(opt);
          }
        } else {
          this.form.monto = e.target.value;
        }
      });
    }
  }
};

document.fonts.ready.then(() => { app.render(); });
</script>
</body>
</html>
